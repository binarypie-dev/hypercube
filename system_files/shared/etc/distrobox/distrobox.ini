# Hypercube Distrobox Configuration
#
# No pre-configured containers. The devcube IDE (Neovim + AI agents + zellij +
# the workbox plugin) now ships as a standalone, portable podman image instead of a
# distrobox container (set up with 'ujust devcube-setup', launched via 'devc').
#
# distrobox itself remains installed for ad-hoc toolboxes; add your own
# [container] sections here as needed.
